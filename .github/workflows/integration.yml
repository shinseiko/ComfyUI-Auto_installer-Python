name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sunday
  push:
    branches: [main, python-rewrite]
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'docker-compose.yml'
      - '.dockerignore'

jobs:
  full-install-windows:
    name: Full E2E Install
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -e . uv

      - name: Run Install Phase
        env:
          PYTHONUTF8: "1"
        run: python -m src.cli install --path C:\comfyui_test --type venv --yes --verbose

      - name: Run Update Phase
        env:
          PYTHONUTF8: "1"
        run: python -m src.cli update --path C:\comfyui_test --yes --verbose

      - name: Verify Launchers exist
        run: |
          if (!(Test-Path -Path "C:\comfyui_test\UmeAiRT-Start-ComfyUI.bat")) {
            Write-Error "Launcher was not generated."
            exit 1
          }

  validate-checksums:
    name: Validate Dependencies SHA-256
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" pytest-asyncio httpx

      - name: Run Checksum Integrations
        run: pytest tests/test_checksums_integration.py -v -m "integration"

  # ── Docker Build & Smoke Test ───────────────────────────────────
  docker-build-linux:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t umeairt/comfyui:ci .

      - name: Verify Image Contents
        run: |
          echo "Checking Python..."
          docker run --rm --entrypoint python umeairt/comfyui:ci --version

          echo "Checking uv..."
          docker run --rm --entrypoint uv umeairt/comfyui:ci --version

          echo "Checking ComfyUI directory..."
          docker run --rm --entrypoint ls umeairt/comfyui:ci /app/ComfyUI/main.py

          echo "Checking CLI is installed..."
          docker run --rm --entrypoint python umeairt/comfyui:ci -c "from src.cli import app; print('✅ CLI importable')"

          echo "Checking venv exists..."
          docker run --rm --entrypoint ls umeairt/comfyui:ci /app/scripts/venv/bin/python

          echo "✅ All standard image checks passed"

      - name: Build Cloud Variant
        run: docker build --build-arg VARIANT=cloud -t umeairt/comfyui:cloud-ci .

      - name: Verify Cloud Variant
        run: |
          echo "Checking JupyterLab is installed..."
          docker run --rm --entrypoint python umeairt/comfyui:cloud-ci -c "import jupyterlab; print(f'✅ JupyterLab {jupyterlab.__version__}')"

