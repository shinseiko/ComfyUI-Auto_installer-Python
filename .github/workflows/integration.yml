name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sunday
  push:
    branches: [python-rewrite]
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'docker-compose.yml'
      - '.dockerignore'

jobs:
  full-install-windows:
    name: Full E2E Install
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -e . uv

      - name: Run Install Phase
        env:
          PYTHONUTF8: "1"
        run: python -m src.cli install --path C:\comfyui_test --type venv --yes --verbose

      - name: Run Update Phase
        env:
          PYTHONUTF8: "1"
        run: python -m src.cli update --path C:\comfyui_test --yes --verbose

      - name: Verify Launchers exist
        run: |
          if (!(Test-Path -Path "C:\comfyui_test\UmeAiRT-Start-ComfyUI.bat")) {
            Write-Error "Launcher was not generated."
            exit 1
          }

  validate-checksums:
    name: Validate Dependencies SHA-256
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" pytest-asyncio httpx

      - name: Run Checksum Integrations
        run: pytest tests/test_checksums_integration.py -v -m "integration"

  # ── Docker Build & Smoke Test ───────────────────────────────────
  docker-build-linux:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t umeairt/comfyui:ci .

      - name: Start Container
        run: |
          docker run -d --name comfyui-ci \
            -p 8188:8188 \
            umeairt/comfyui:ci

      - name: Wait for ComfyUI Web Server
        run: |
          echo "Waiting for ComfyUI to start..."
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8188 | grep -q "200"; then
              echo "✅ ComfyUI responded after ${i}x5s"
              exit 0
            fi
            sleep 5
          done
          echo "❌ ComfyUI did not respond within 5 minutes"
          exit 1

      - name: Verify ComfyUI HTML
        run: |
          TITLE=$(curl -s http://localhost:8188 | grep -o '<title>.*</title>')
          echo "Page title: $TITLE"
          echo "$TITLE" | grep -qi "ComfyUI" || (echo "❌ Unexpected page content" && exit 1)
          echo "✅ ComfyUI web interface verified"

      - name: Dump Container Logs (on failure)
        if: failure()
        run: docker logs comfyui-ci

      - name: Cleanup
        if: always()
        run: docker rm -f comfyui-ci || true
