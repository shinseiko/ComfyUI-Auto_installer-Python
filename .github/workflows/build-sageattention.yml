# Build SageAttention wheels for multiple Python versions and GPU architectures.
# Compiled wheels are uploaded to HuggingFace Assets for the installer to download.
#
# Strategy: SA2 builds one wheel per GPU architecture (sm_80, sm_86, sm_89, sm_90)
# to ensure each SM-specific C extension module is compiled. This is required because
# SageAttention dispatches to architecture-specific modules (sm80_compile, sm89_compile, etc.)
# that cannot be generated via PTX JIT — they must be natively compiled.
#
# Windows builds use the sdbds/SageAttention-for-windows fork (MSVC patches).
# SA3 targets Blackwell sm_100 only.
# A final job updates tools_manifest.json with SHA-256 hashes.
#
# Trigger: manual dispatch or tag push matching "sageattention-v*"
name: Build SageAttention Wheels

on:
  workflow_dispatch:
    inputs:
      sageattention_ref:
        description: 'SageAttention git ref (branch/tag/commit)'
        default: 'main'
        required: false
  push:
    tags:
      - 'sageattention-v*'

env:
  # HuggingFace repo where wheels are uploaded
  HF_REPO: UmeAiRT/ComfyUI-Auto-Installer-Assets
  HF_WHEEL_DIR: whl
  # ModelScope mirror (international .ai endpoint)
  MS_REPO: UmeAiRT/ComfyUI-Auto-Installer-Assets
  MS_ENDPOINT: "https://www.modelscope.ai"
  # PyTorch version must match the one in dependencies.json
  TORCH_VERSION: "2.10.0"
  TORCH_INDEX: "https://download.pytorch.org/whl/cu130"
  VENV_PYTHON: "/build-venv/bin/python"

jobs:
  # ---------------------------------------------------------------------------
  # SA2 Linux: one job per (python × cuda_arch) — each produces one wheel
  # ---------------------------------------------------------------------------
  build-sa2:
    name: "SA2 — Python ${{ matrix.python }} — sm_${{ matrix.cuda_arch_short }} (Linux)"
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.0.2-devel-ubuntu24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        cuda_arch: ["8.0", "8.6", "8.9", "9.0"]
        include:
          - cuda_arch: "8.0"
            cuda_arch_short: "80"
          - cuda_arch: "8.6"
            cuda_arch_short: "86"
          - cuda_arch: "8.9"
            cuda_arch_short: "89"
          - cuda_arch: "9.0"
            cuda_arch_short: "90"
    steps:
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git curl build-essential ca-certificates

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          cp $HOME/.local/bin/uv /usr/local/bin/uv

      - name: Create build venv with Python ${{ matrix.python }}
        run: |
          uv python install ${{ matrix.python }}
          uv venv /build-venv --python ${{ matrix.python }}

      - name: Install PyTorch
        run: |
          uv pip install --python $VENV_PYTHON \
            torch==${{ env.TORCH_VERSION }}+cu130 \
            --index-url ${{ env.TORCH_INDEX }}

      - name: Install build tools
        run: |
          uv pip install --python $VENV_PYTHON pip setuptools wheel packaging

      - name: Clone SageAttention
        run: |
          git clone https://github.com/thu-ml/SageAttention.git /sageattention
          cd /sageattention
          git checkout ${{ github.event.inputs.sageattention_ref || 'main' }}

      - name: Build SageAttention 2 wheel (sm_${{ matrix.cuda_arch_short }})
        working-directory: /sageattention
        env:
          TORCH_CUDA_ARCH_LIST: "${{ matrix.cuda_arch }}"
          MAX_JOBS: "1"
          PATH: "/build-venv/bin:/usr/local/cuda/bin:$PATH"
        run: |
          echo "Building for TORCH_CUDA_ARCH_LIST=$TORCH_CUDA_ARCH_LIST"
          $VENV_PYTHON -m pip wheel . --no-deps --no-build-isolation -w /wheels

      - name: Upload wheel to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv pip install --python $VENV_PYTHON huggingface_hub
          ls -lah /wheels/
          $VENV_PYTHON -c "
          from huggingface_hub import HfApi
          import glob, os
          api = HfApi()
          for whl in glob.glob('/wheels/*.whl'):
              name = os.path.basename(whl)
              repo_path = '${{ env.HF_WHEEL_DIR }}/sm${{ matrix.cuda_arch_short }}/' + name
              print(f'Uploading {name} → {repo_path}')
              api.upload_file(
                  path_or_fileobj=whl,
                  path_in_repo=repo_path,
                  repo_id='${{ env.HF_REPO }}',
                  repo_type='model',
              )
              print('Done.')
          "

      - name: Upload wheel to ModelScope
        continue-on-error: true
        env:
          MODELSCOPE_API_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
        run: |
          uv pip install --python $VENV_PYTHON modelscope numpy
          $VENV_PYTHON -c "
          from modelscope.hub.api import HubApi
          import glob, os
          api = HubApi(endpoint=os.environ.get('MS_ENDPOINT', 'https://www.modelscope.ai'))
          api.login(os.environ['MODELSCOPE_API_TOKEN'])
          for whl in glob.glob('/wheels/*.whl'):
              name = os.path.basename(whl)
              repo_path = '${{ env.HF_WHEEL_DIR }}/sm${{ matrix.cuda_arch_short }}/' + name
              print(f'Uploading {name} → {repo_path} (ModelScope)')
              api.upload_file(
                  path_or_fileobj=whl,
                  path_in_repo=repo_path,
                  repo_id='${{ env.MS_REPO }}',
                  repo_type='dataset',
                  endpoint='${{ env.MS_ENDPOINT }}',
                  commit_message='CI: Upload SageAttention wheel',
              )
              print('Done.')
          "

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sa2-sm${{ matrix.cuda_arch_short }}-cp${{ matrix.python }}-linux-wheel
          path: /wheels/*.whl
          retention-days: 30

  # ---------------------------------------------------------------------------
  # SA2 Windows: one job per (python × cuda_arch)
  # ---------------------------------------------------------------------------
  build-sa2-windows:
    name: "SA2 Win — Python ${{ matrix.python }} — sm_${{ matrix.cuda_arch_short }}"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        cuda_arch: ["8.0", "8.6", "8.9", "9.0"]
        include:
          - cuda_arch: "8.0"
            cuda_arch_short: "80"
          - cuda_arch: "8.6"
            cuda_arch_short: "86"
          - cuda_arch: "8.9"
            cuda_arch_short: "89"
          - cuda_arch: "9.0"
            cuda_arch_short: "90"
    steps:
      - name: Install CUDA Toolkit 13.0
        shell: pwsh
        run: |
          $url = "https://developer.download.nvidia.com/compute/cuda/13.0.2/network_installers/cuda_13.0.2_windows_network.exe"
          Write-Host "Downloading CUDA 13.0 network installer..."
          Invoke-WebRequest -Uri $url -OutFile cuda_installer.exe -UseBasicParsing
          Write-Host "Installing CUDA toolkit (full)..."
          Start-Process -FilePath .\cuda_installer.exe -ArgumentList '-s' -Wait -NoNewWindow
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0"
          echo "CUDA_HOME=$cudaPath" >> $env:GITHUB_ENV
          echo "CUDA_PATH=$cudaPath" >> $env:GITHUB_ENV
          echo "$cudaPath\bin" >> $env:GITHUB_PATH
          & "$cudaPath\bin\nvcc.exe" --version

      - name: Install uv
        shell: pwsh
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          echo "$env:USERPROFILE\.local\bin" >> $env:GITHUB_PATH

      - name: Create build venv with Python ${{ matrix.python }}
        run: |
          uv python install ${{ matrix.python }}
          uv venv C:\build-venv --python ${{ matrix.python }}

      - name: Install PyTorch
        run: |
          uv pip install --python C:\build-venv\Scripts\python.exe ^
            torch==${{ env.TORCH_VERSION }}+cu130 ^
            --index-url ${{ env.TORCH_INDEX }}
        shell: cmd

      - name: Install build tools
        run: uv pip install --python C:\build-venv\Scripts\python.exe pip setuptools wheel packaging

      - name: Clone SageAttention (Windows fork)
        run: git clone https://github.com/sdbds/SageAttention-for-windows.git C:\sageattention

      - name: Build SageAttention 2 wheel (sm_${{ matrix.cuda_arch_short }})
        working-directory: C:\sageattention
        shell: cmd
        env:
          TORCH_CUDA_ARCH_LIST: "${{ matrix.cuda_arch }}"
          MAX_JOBS: "1"
          DISTUTILS_USE_SDK: "1"
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          C:\build-venv\Scripts\python.exe -m pip wheel . --no-deps --no-build-isolation -w C:\wheels

      - name: Upload wheel to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        shell: pwsh
        run: |
          uv pip install --python C:\build-venv\Scripts\python.exe huggingface_hub
          Get-ChildItem C:\wheels
          C:\build-venv\Scripts\python.exe -c @"
          from huggingface_hub import HfApi
          import glob, os
          api = HfApi()
          for w in glob.glob('C:\\wheels\\*.whl'):
              name = os.path.basename(w)
              repo_path = '${{ env.HF_WHEEL_DIR }}/sm${{ matrix.cuda_arch_short }}/' + name
              print(f'Uploading {name} -> {repo_path}')
              api.upload_file(path_or_fileobj=w, path_in_repo=repo_path, repo_id='${{ env.HF_REPO }}', repo_type='model')
              print('Done.')
          "@

      - name: Upload wheel to ModelScope
        continue-on-error: true
        env:
          MODELSCOPE_API_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
        shell: pwsh
        run: |
          uv pip install --python C:\build-venv\Scripts\python.exe modelscope numpy
          C:\build-venv\Scripts\python.exe -c @"
          from modelscope.hub.api import HubApi
          import glob, os
          api = HubApi(endpoint=os.environ.get('MS_ENDPOINT', 'https://www.modelscope.ai'))
          api.login(os.environ['MODELSCOPE_API_TOKEN'])
          for w in glob.glob('C:\\wheels\\*.whl'):
              name = os.path.basename(w)
              repo_path = '${{ env.HF_WHEEL_DIR }}/sm${{ matrix.cuda_arch_short }}/' + name
              print(f'Uploading {name} -> {repo_path} (ModelScope)')
              api.upload_file(path_or_fileobj=w, path_in_repo=repo_path, repo_id='${{ env.MS_REPO }}', repo_type='dataset', endpoint='${{ env.MS_ENDPOINT }}', commit_message='CI: Upload SageAttention wheel')
              print('Done.')
          "@

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sa2-sm${{ matrix.cuda_arch_short }}-cp${{ matrix.python }}-win-wheel
          path: C:\wheels\*.whl
          retention-days: 30

  # ---------------------------------------------------------------------------
  # SA3 Blackwell: Python 3.13 only, sm_100
  # ---------------------------------------------------------------------------
  build-sa3:
    name: "SA3 Blackwell — Python 3.13 (sm_100)"
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.0.2-devel-ubuntu24.04
    steps:
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git curl build-essential ca-certificates

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          cp $HOME/.local/bin/uv /usr/local/bin/uv

      - name: Create build venv with Python 3.13
        run: |
          uv python install 3.13
          uv venv /build-venv --python 3.13

      - name: Install PyTorch
        run: |
          uv pip install --python $VENV_PYTHON \
            torch==${{ env.TORCH_VERSION }}+cu130 \
            --index-url ${{ env.TORCH_INDEX }}

      - name: Install build tools
        run: |
          uv pip install --python $VENV_PYTHON pip setuptools wheel packaging

      - name: Clone SageAttention
        run: |
          git clone https://github.com/thu-ml/SageAttention.git /sageattention
          cd /sageattention
          git checkout ${{ github.event.inputs.sageattention_ref || 'main' }}

      - name: Patch SA3 setup.py (bypass runtime GPU detection for cross-compilation)
        run: |
          cd /sageattention/sageattention3_blackwell
          echo "=== Before patch (line 62) ==="
          sed -n '58,66p' setup.py
          # Replace torch.cuda.get_device_capability() with hardcoded Blackwell (10, 0)
          sed -i 's/torch.cuda.get_device_capability()/(10, 0)/g' setup.py
          echo "=== After patch ==="
          sed -n '58,66p' setup.py

      - name: Build SageAttention 3 Blackwell wheel
        working-directory: /sageattention/sageattention3_blackwell
        env:
          TORCH_CUDA_ARCH_LIST: "10.0"
          MAX_JOBS: "1"
          PATH: "/build-venv/bin:/usr/local/cuda/bin:$PATH"
        run: |
          $VENV_PYTHON setup.py bdist_wheel --dist-dir /wheels

      - name: List built wheels
        run: ls -lah /wheels/

      - name: Upload wheel to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv pip install --python $VENV_PYTHON huggingface_hub
          $VENV_PYTHON -c "
          from huggingface_hub import HfApi
          import glob
          api = HfApi()
          for whl in glob.glob('/wheels/*.whl'):
              print(f'Uploading {whl}...')
              api.upload_file(
                  path_or_fileobj=whl,
                  path_in_repo='${{ env.HF_WHEEL_DIR }}/' + whl.split('/')[-1],
                  repo_id='${{ env.HF_REPO }}',
                  repo_type='model',
              )
              print('Done.')
          "

      - name: Upload wheel to ModelScope
        continue-on-error: true
        env:
          MODELSCOPE_API_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
        run: |
          uv pip install --python $VENV_PYTHON modelscope numpy
          $VENV_PYTHON -c "
          from modelscope.hub.api import HubApi
          import glob, os
          api = HubApi(endpoint=os.environ.get('MS_ENDPOINT', 'https://www.modelscope.ai'))
          api.login(os.environ['MODELSCOPE_API_TOKEN'])
          for whl in glob.glob('/wheels/*.whl'):
              name = os.path.basename(whl)
              print(f'Uploading {name} to ModelScope...')
              api.upload_file(
                  path_or_fileobj=whl,
                  path_in_repo='${{ env.HF_WHEEL_DIR }}/' + name,
                  repo_id='${{ env.MS_REPO }}',
                  repo_type='dataset',
                  endpoint='${{ env.MS_ENDPOINT }}',
                  commit_message='CI: Upload SageAttention wheel',
              )
              print('Done.')
          "

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sa3-blackwell-wheel
          path: /wheels/*.whl
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Update tools_manifest.json with SHA-256 of all built wheels
  # ---------------------------------------------------------------------------
  update-manifest:
    name: "Update tools_manifest.json"
    needs: [build-sa2, build-sa2-windows, build-sa3]
    if: always() && (needs.build-sa2.result == 'success' || needs.build-sa2-windows.result == 'success' || needs.build-sa3.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/wheels
          # Each artifact has name like: sa2-sm89-cp3.13-linux-wheel
          # download-artifact creates subdirectories per artifact name

      - name: List downloaded wheels
        run: find /tmp/wheels -name "*.whl" -ls

      - name: Install uv and dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv python install 3.13
          uv venv /tmp/venv --python 3.13
          uv pip install --python /tmp/venv/bin/python huggingface_hub

      - name: Update manifest on HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ env.HF_REPO }}
        run: |
          /tmp/venv/bin/python << 'PYEOF'
          import json, hashlib, os, re
          from pathlib import Path
          from huggingface_hub import HfApi, hf_hub_download

          api = HfApi()
          repo_id = os.environ["HF_REPO"]

          # Download existing manifest
          try:
              manifest_path = hf_hub_download(
                  repo_id=repo_id,
                  filename="tools_manifest.json",
                  repo_type="model",
              )
              with open(manifest_path) as f:
                  manifest = json.load(f)
          except Exception as e:
              print(f"Could not download existing manifest: {e}")
              manifest = {"_manifest_version": 1, "whl": {}}

          if "whl" not in manifest:
              manifest["whl"] = {}

          # Walk artifact directories — each named like sa2-sm89-cp3.13-linux-wheel
          sa2_files = {}
          sa3_files = {}
          sa2_version = "unknown"

          wheels_root = Path("/tmp/wheels")
          for artifact_dir in sorted(wheels_root.iterdir()):
              if not artifact_dir.is_dir():
                  continue

              # Extract arch from artifact name: sa2-sm89-cp3.13-linux-wheel → sm89
              dir_name = artifact_dir.name
              sm_match = re.search(r"sm(\d+)", dir_name)
              arch_key = f"sm{sm_match.group(1)}" if sm_match else "default"

              for whl_path in sorted(artifact_dir.glob("*.whl")):
                  filename = whl_path.name
                  sha256 = hashlib.sha256(whl_path.read_bytes()).hexdigest()

                  parts = filename.split("-")
                  pkg_name = parts[0]
                  version = parts[1]
                  cp_tag = parts[2]  # e.g. cp313

                  if "linux" in filename:
                      platform_suffix = "linux"
                  elif "win" in filename:
                      platform_suffix = "win"
                  else:
                      platform_suffix = "other"

                  key = f"{cp_tag}_{platform_suffix}" if platform_suffix != "other" else cp_tag

                  # Store with directory path for correct lookup
                  if pkg_name.startswith("sageattn3") or pkg_name.startswith("sageattention3"):
                      entry = {"filename": f"whl/{filename}", "sha256": sha256}
                      sa3_files[key] = entry
                  else:
                      entry = {"filename": f"whl/{arch_key}/{filename}", "sha256": sha256}
                      if arch_key not in sa2_files:
                          sa2_files[arch_key] = {}
                      sa2_files[arch_key][key] = entry
                      sa2_version = version

                  print(f"  [{arch_key}] {filename}: {sha256}")

          # Update manifest
          for arch_key, files in sa2_files.items():
              manifest_key = f"sageattention_{arch_key}"
              if manifest_key not in manifest["whl"]:
                  manifest["whl"][manifest_key] = {"files": {}}
              sa2 = manifest["whl"][manifest_key]
              sa2["version"] = sa2_version
              if "files" not in sa2:
                  sa2["files"] = {}
              sa2["files"].update(files)
              sa2["_note"] = f"Pre-compiled for {arch_key}. Auto-updated by CI."

          if sa3_files:
              if "sageattention3_blackwell" not in manifest["whl"]:
                  manifest["whl"]["sageattention3_blackwell"] = {"files": {}}
              sa3 = manifest["whl"]["sageattention3_blackwell"]
              sa3["version"] = version.split("+")[0]
              sa3["platform"] = "linux"
              if "files" not in sa3:
                  sa3["files"] = {}
              sa3["files"].update(sa3_files)
              sa3["_note"] = "Blackwell (sm_100) only. Auto-updated by CI."

          # Update timestamp
          from datetime import date
          manifest["_updated"] = str(date.today())

          # Write and upload
          manifest_out = "/tmp/tools_manifest.json"
          with open(manifest_out, "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

          print("\n=== Updated manifest ===")
          for key in sorted(manifest.get("whl", {}).keys()):
              if "sage" in key:
                  print(f"\n{key}:")
                  print(json.dumps(manifest["whl"][key], indent=2))

          api.upload_file(
              path_or_fileobj=manifest_out,
              path_in_repo="tools_manifest.json",
              repo_id=repo_id,
              repo_type="model",
          )
          print("\n✅ Manifest uploaded to HuggingFace!")
          PYEOF

      - name: Upload manifest to ModelScope
        continue-on-error: true
        env:
          MODELSCOPE_API_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
        run: |
          uv pip install --python /tmp/venv/bin/python modelscope numpy
          /tmp/venv/bin/python <<'PYEOF'
          from modelscope.hub.api import HubApi
          import os
          api = HubApi(endpoint=os.environ.get('MS_ENDPOINT', 'https://www.modelscope.ai'))
          api.login(os.environ["MODELSCOPE_API_TOKEN"])
          print("Uploading tools_manifest.json to ModelScope...")
          api.upload_file(
              path_or_fileobj="/tmp/tools_manifest.json",
              path_in_repo="tools_manifest.json",
              repo_id="${{ env.MS_REPO }}",
              repo_type="dataset",
              endpoint="${{ env.MS_ENDPOINT }}",
              commit_message="CI: Update tools_manifest.json",
          )
          print("\n✅ Manifest uploaded to ModelScope!")
          PYEOF
