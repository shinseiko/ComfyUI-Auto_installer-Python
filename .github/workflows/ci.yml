name: CI Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop, python-rewrite]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/**'
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Security (fast, single Python version) ──────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install ruff bandit

      - name: Ruff (lint)
        run: ruff check src/ tests/ --config pyproject.toml

      - name: Bandit (security)
        run: bandit -r src/ -c pyproject.toml -ll

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true  # CVEs in upstream deps should not block CI
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pip-audit
          pip install -e ".[dev]"

      - name: pip-audit (CVE scan)
        run: pip-audit --desc

  # ── Unit Tests (matrix across Python versions) ─────────────────
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=long -m "not integration"

  # ── Coverage (single version, after tests) ─────────────────────
  coverage:
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" coverage

      - name: Run tests with coverage
        run: |
          coverage run --source=src --omit="src/tui/*,src/settings.py" -m pytest tests/ -q -m "not integration"
          coverage report -m --skip-covered --fail-under=70
