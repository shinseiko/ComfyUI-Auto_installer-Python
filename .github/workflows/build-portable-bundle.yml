# Build a pre-configured portable ComfyUI bundle for Windows.
# Downloads the official Comfy-Org portable release, applies UmeAiRT
# customizations (custom nodes, optimizations, launchers, settings),
# recompresses, and publishes to HuggingFace + ModelScope.
#
# Trigger: schedule (polls for new ComfyUI releases) or manual dispatch.
name: Build Portable UmeAiRT-ComfyUI Bundle

on:
  schedule:
    # Poll once daily for new ComfyUI releases
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      comfyui_version:
        description: 'ComfyUI release tag (e.g. v0.18.0). Empty = latest.'
        default: ''
        required: false
      force_rebuild:
        description: 'Force rebuild even if version unchanged'
        type: boolean
        default: false
      node_tier:
        description: 'Specific tier to build (empty = all detected tiers)'
        default: ''
        required: false

env:
  HF_REPO: UmeAiRT/ComfyUI-Auto-Installer-Assets
  MS_REPO: UmeAiRT/ComfyUI-Auto-Installer-Assets
  MS_ENDPOINT: "https://www.modelscope.ai"
  DIST_DIR: distributions
  COMFYUI_REPO: Comfy-Org/ComfyUI
  MANIFEST_NAME: distributions_manifest.json

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Check if a new ComfyUI release is available
  # ---------------------------------------------------------------------------
  check-release:
    name: "Check for new ComfyUI release"
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
      download_url: ${{ steps.check.outputs.download_url }}
      tiers_json: ${{ steps.check.outputs.tiers_json }}
    steps:
      - uses: actions/checkout@v4

      - name: Check latest ComfyUI release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
          INPUT_VERSION: ${{ github.event.inputs.comfyui_version || '' }}
          INPUT_TIER: ${{ github.event.inputs.node_tier || '' }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          # ── Detect tiers from custom_nodes.json ─────────────────────
          if [ -n "$INPUT_TIER" ]; then
            TIERS_JSON="[\"$INPUT_TIER\"]"
            echo "Using manually specified tier: $INPUT_TIER"
          else
            TIERS_JSON=$(python3 -c "
          import json
          with open('scripts/custom_nodes.json') as f:
              nodes = json.load(f)['nodes']
          tiers = sorted({n['tier'] for n in nodes} - {'minimal'})
          print(json.dumps(tiers))
          ")
            echo "Auto-detected tiers: $TIERS_JSON"
          fi
          echo "tiers_json=$TIERS_JSON" >> "$GITHUB_OUTPUT"

          # ── Get the target version ──────────────────────────────────
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            echo "Using manually specified version: $VERSION"
            DOWNLOAD_URL=$(gh api "repos/${{ env.COMFYUI_REPO }}/releases/tags/$VERSION" \
              --jq '.assets[] | select(.name == "ComfyUI_windows_portable_nvidia.7z") | .browser_download_url' 2>/dev/null || echo "")
          else
            VERSION=$(gh api "repos/${{ env.COMFYUI_REPO }}/releases/latest" --jq '.tag_name')
            echo "Latest ComfyUI release: $VERSION"
            DOWNLOAD_URL=$(gh api "repos/${{ env.COMFYUI_REPO }}/releases/latest" \
              --jq '.assets[] | select(.name == "ComfyUI_windows_portable_nvidia.7z") | .browser_download_url')
          fi

          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::Could not find ComfyUI_windows_portable_nvidia.7z in release $VERSION"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Download URL: $DOWNLOAD_URL"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"

          # ── Check if any tier needs building ────────────────────────
          MANIFEST_URL="https://huggingface.co/${{ env.HF_REPO }}/resolve/main/${{ env.MANIFEST_NAME }}"
          NEED_BUILD="false"

          if [ "$FORCE_REBUILD" = "true" ]; then
            NEED_BUILD="true"
            echo "Force rebuild requested."
          elif curl -sfL -o /tmp/dist_manifest.json "$MANIFEST_URL" 2>/dev/null; then
            # Check if any tier is missing from the manifest
            NEED_BUILD=$(python3 -c "
          import json
          with open('/tmp/dist_manifest.json') as f:
              m = json.load(f)
          tiers = json.loads('$TIERS_JSON')
          existing = m.get('distributions', {})
          missing = [t for t in tiers if f'${VERSION}_nvidia_{t}' not in existing]
          print('true' if missing else 'false')
          " 2>/dev/null || echo "true")
          else
            NEED_BUILD="true"
            echo "No existing manifest found — first build."
          fi

          echo "should_build=$NEED_BUILD" >> "$GITHUB_OUTPUT"
          echo "Build decision: $NEED_BUILD (tiers: $TIERS_JSON)"

  # ---------------------------------------------------------------------------
  # Job 2: Build the portable bundle
  # ---------------------------------------------------------------------------
  build-bundle:
    name: "Build Bundle (${{ matrix.node_tier }})"
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node_tier: ${{ fromJson(needs.check-release.outputs.tiers_json) }}
    outputs:
      python_version: ${{ steps.verify.outputs.python_version }}
      pytorch_version: ${{ steps.verify.outputs.pytorch_version }}
      cuda_version: ${{ steps.verify.outputs.cuda_version }}
    env:
      COMFYUI_VERSION: ${{ needs.check-release.outputs.version }}
      DOWNLOAD_URL: ${{ needs.check-release.outputs.download_url }}
      NODE_TIER: ${{ matrix.node_tier }}
      PORTABLE_ROOT: C:\portable
      PORTABLE: C:\portable\ComfyUI_windows_portable
    steps:
      - name: Checkout installer repo
        uses: actions/checkout@v4
        with:
          path: installer

      - name: Download ComfyUI Portable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:PORTABLE_ROOT | Out-Null
          Write-Host "Downloading ComfyUI portable ($env:COMFYUI_VERSION)..."
          Write-Host "URL: $env:DOWNLOAD_URL"
          Invoke-WebRequest -Uri $env:DOWNLOAD_URL -OutFile "$env:PORTABLE_ROOT\comfyui_portable.7z" -UseBasicParsing
          Write-Host "Download complete. Size: $([math]::Round((Get-Item "$env:PORTABLE_ROOT\comfyui_portable.7z").Length / 1MB, 1)) MB"

      - name: Extract portable
        shell: pwsh
        run: |
          Write-Host "Extracting..."
          7z x "$env:PORTABLE_ROOT\comfyui_portable.7z" -o"$env:PORTABLE_ROOT" -y
          Remove-Item "$env:PORTABLE_ROOT\comfyui_portable.7z" -Force
          Write-Host "Contents of portable root:"
          Get-ChildItem $env:PORTABLE -Name

      - name: Verify portable structure
        id: verify
        shell: pwsh
        run: |
          $python = "$env:PORTABLE\python_embeded\python.exe"
          $comfy = "$env:PORTABLE\ComfyUI"

          if (-not (Test-Path $python)) { throw "python_embeded\python.exe not found!" }
          if (-not (Test-Path $comfy)) { throw "ComfyUI\ directory not found!" }

          # Capture versions for manifest
          $pyVer = & $python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}.{sys.version_info.micro}')"
          $torchVer = & $python -c "import torch; print(torch.__version__)"
          $cudaVer = & $python -c "import torch; print(torch.version.cuda)"

          Write-Host "Python: $pyVer | PyTorch: $torchVer | CUDA: $cudaVer"

          echo "python_version=$pyVer" >> $env:GITHUB_OUTPUT
          echo "pytorch_version=$torchVer" >> $env:GITHUB_OUTPUT
          echo "cuda_version=$cudaVer" >> $env:GITHUB_OUTPUT

      # ── Provisioning ──────────────────────────────────────────────
      - name: Provision configuration files
        shell: pwsh
        run: |
          $scriptsDir = "$env:PORTABLE\scripts"
          New-Item -ItemType Directory -Force -Path $scriptsDir | Out-Null

          # Copy essential configs from installer repo
          $configs = @(
            "dependencies.json",
            "custom_nodes.json",
            "nunchaku_versions.json"
          )
          foreach ($f in $configs) {
            $src = "installer\scripts\$f"
            if (Test-Path $src) {
              Copy-Item $src "$scriptsDir\$f"
              Write-Host "  ✓ $f"
            }
          }

          # Copy ComfyUI settings
          $settingsDst = "$env:PORTABLE\user\default"
          New-Item -ItemType Directory -Force -Path $settingsDst | Out-Null
          $settingsSrc = "installer\scripts\comfy.settings.json"
          if (Test-Path $settingsSrc) {
            Copy-Item $settingsSrc "$settingsDst\comfy.settings.json"
            Write-Host "  ✓ comfy.settings.json -> user\default\"
          }

          # Mark install type
          Set-Content -Path "$scriptsDir\install_type" -Value "embedded"

      # ── Standard packages ─────────────────────────────────────────
      - name: Install standard Python packages
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          $python = "$env:PORTABLE\python_embeded\python.exe"

          # Install ComfyUI requirements (should mostly be satisfied already)
          $reqFile = "$env:PORTABLE\ComfyUI\requirements.txt"
          if (Test-Path $reqFile) {
            Write-Host "Installing ComfyUI requirements..."
            & $python -m pip install -r $reqFile --quiet 2>&1 | ForEach-Object { Write-Host "  $_" }
          }


          # Install additional standard packages from dependencies.json
          Write-Host "Installing standard packages..."
          & $python -c @"
          import json
          with open('installer/scripts/dependencies.json') as f:
              deps = json.load(f)
          pkgs = deps.get('pip_packages', {}).get('standard', [])
          # Filter out packages installed separately (pre-built wheels or no GPU)
          skip = {'cupy-cuda13x', 'insightface'}  # insightface uses pre-built wheel from Assets
          pkgs = [p for p in pkgs if p not in skip]
          print(' '.join(pkgs))
          "@ | ForEach-Object {
            if ($_ -and $_.Trim()) {
              $packages = $_.Trim() -split '\s+'
              Write-Host "  Installing $($packages.Count) packages..."
              & $python -m pip install @packages --quiet 2>&1 | ForEach-Object { Write-Host "  $_" }
            }
          }
          Write-Host "Standard packages step complete (some may have failed — non-blocking)."

      # ── Custom Nodes ──────────────────────────────────────────────
      - name: Install custom nodes (${{ needs.check-release.outputs.node_tier }})
        id: nodes
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $python = "$env:PORTABLE\python_embeded\python.exe"
          $nodesDir = "$env:PORTABLE\ComfyUI\custom_nodes"
          $tier = $env:NODE_TIER

          Write-Host "Installing custom nodes (tier: $tier)..."

          # Parse custom_nodes.json and filter by tier
          $manifest = Get-Content "installer\scripts\custom_nodes.json" -Raw | ConvertFrom-Json
          $tierOrder = @{ "minimal" = 0; "umeairt" = 1; "full" = 2 }
          $targetLevel = $tierOrder[$tier]
          $installedNodes = @()

          foreach ($node in $manifest.nodes) {
            $nodeLevel = $tierOrder[$node.tier]
            if ($nodeLevel -gt $targetLevel) {
              continue
            }

            $nodeName = $node.name
            $nodeUrl = $node.url
            $nodePath = if ($node.subfolder) {
              Join-Path $nodesDir $node.subfolder
            } else {
              Join-Path $nodesDir $nodeName
            }

            if (Test-Path $nodePath) {
              Write-Host "  ⏭️ $nodeName (already exists)"
              $installedNodes += $nodeName
              continue
            }

            Write-Host "  📦 $nodeName..."
            try {
              # Use Start-Process to avoid PowerShell treating git stderr as errors
              $proc = Start-Process -FilePath "git" -ArgumentList "clone","--depth","1",$nodeUrl,$nodePath -Wait -PassThru -NoNewWindow -RedirectStandardError "NUL" 2>$null
              if ($proc.ExitCode -ne 0) { throw "git clone exited with code $($proc.ExitCode)" }

              # Install requirements if specified
              if ($node.requirements) {
                $reqFile = Join-Path $nodePath $node.requirements
                if (Test-Path $reqFile) {
                  & $python -m pip install -r $reqFile --quiet 2>&1 | Out-Null
                  Write-Host "    ✓ requirements installed"
                }
              }
              $installedNodes += $nodeName
              Write-Host "    ✓ cloned"
            } catch {
              Write-Host "    ⚠️ Failed: $_"
            }
          }

          # Provision nunchaku_versions.json
          $nunchakuSrc = "installer\scripts\nunchaku_versions.json"
          $nunchakuDst = "$nodesDir\ComfyUI-nunchaku\nunchaku_versions.json"
          if ((Test-Path $nunchakuSrc) -and (Test-Path (Split-Path $nunchakuDst))) {
            Copy-Item $nunchakuSrc $nunchakuDst
            Write-Host "  ✓ nunchaku_versions.json provisioned"
          }

          # Output node metadata
          $nodeCount = $installedNodes.Count
          $nodeListJson = ($installedNodes | ConvertTo-Json -Compress)
          echo "node_count=$nodeCount" >> $env:GITHUB_OUTPUT
          echo "node_list=$nodeListJson" >> $env:GITHUB_OUTPUT
          Write-Host "Installed $nodeCount custom nodes."
          exit 0

      # ── Triton + SageAttention ────────────────────────────────────
      - name: Install Triton + SageAttention
        shell: pwsh
        continue-on-error: true
        run: |
          $python = "$env:PORTABLE\python_embeded\python.exe"

          # Triton is required by SageAttention at runtime
          Write-Host "Installing triton-windows..."
          & $python -m pip install triton-windows --quiet 2>&1 | ForEach-Object { Write-Host "  $_" }

          # Determine Python version tag (e.g. cp313)
          $pyVer = & $python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')"
          $wheelKey = "${pyVer}_win"

          Write-Host "Looking for SageAttention wheel: $wheelKey"

          # Download tools_manifest.json to find the right wheel
          & $python -c @"
          import urllib.request, json, sys
          url = 'https://huggingface.co/UmeAiRT/ComfyUI-Auto-Installer-Assets/resolve/main/tools_manifest.json'
          try:
              data = json.loads(urllib.request.urlopen(url, timeout=30).read())
              sa2 = data.get('whl', {}).get('sageattention', {})
              files = sa2.get('files', {})
              entry = files.get('$wheelKey')
              if entry:
                  filename = entry['filename']
                  dl_url = f'https://huggingface.co/UmeAiRT/ComfyUI-Auto-Installer-Assets/resolve/main/{filename}'
                  print(f'WHEEL_URL={dl_url}')
              else:
                  print(f'No wheel found for key: $wheelKey', file=sys.stderr)
                  print(f'Available keys: {list(files.keys())}', file=sys.stderr)
          except Exception as e:
              print(f'Failed to fetch manifest: {e}', file=sys.stderr)
          "@ | ForEach-Object {
            if ($_ -match "^WHEEL_URL=(.+)$") {
              $wheelUrl = $matches[1]
              # Extract real wheel filename from URL (pip needs standard naming)
              $wheelFilename = ($wheelUrl -split '/')[-1]
              $wheelFile = "$env:TEMP\$wheelFilename"
              Write-Host "Downloading SageAttention from: $wheelUrl"
              Write-Host "  Wheel filename: $wheelFilename"
              Invoke-WebRequest -Uri $wheelUrl -OutFile $wheelFile -UseBasicParsing
              & $python -m pip install $wheelFile --quiet
              Remove-Item $wheelFile -Force -ErrorAction SilentlyContinue
              # Verify installation
              $importCheck = & $python -c "import sageattention; print('OK')" 2>&1
              if ($importCheck -match "OK") {
                Write-Host "  ✓ SageAttention installed and verified"
              } else {
                Write-Host "  ⚠️ SageAttention install may have failed: $importCheck"
              }
            }
          }

      # ── Nunchaku pre-built wheel ───────────────────────────────────
      - name: Install nunchaku wheel
        shell: pwsh
        continue-on-error: true
        run: |
          $python = "$env:PORTABLE\python_embeded\python.exe"
          $pyVer = & $python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')"

          Write-Host "Looking for nunchaku wheel: $pyVer"

          & $python -c @"
          import urllib.request, json, sys
          url = 'https://huggingface.co/UmeAiRT/ComfyUI-Auto-Installer-Assets/resolve/main/tools_manifest.json'
          try:
              data = json.loads(urllib.request.urlopen(url, timeout=30).read())
              entry = data.get('whl', {}).get('nunchaku', {}).get('files', {}).get('$pyVer')
              if entry:
                  filename = entry['filename']
                  dl_url = f'https://huggingface.co/UmeAiRT/ComfyUI-Auto-Installer-Assets/resolve/main/{filename}'
                  print(f'WHEEL_URL={dl_url}')
              else:
                  print(f'No nunchaku wheel for $pyVer', file=sys.stderr)
          except Exception as e:
              print(f'Failed to fetch manifest: {e}', file=sys.stderr)
          "@ | ForEach-Object {
            if ($_ -match "^WHEEL_URL=(.+)$") {
              $wheelUrl = $matches[1]
              $wheelFilename = ($wheelUrl -split '/')[-1]
              $wheelFile = "$env:TEMP\$wheelFilename"
              Write-Host "Downloading nunchaku from: $wheelUrl"
              Invoke-WebRequest -Uri $wheelUrl -OutFile $wheelFile -UseBasicParsing
              & $python -m pip install $wheelFile --quiet
              Remove-Item $wheelFile -Force -ErrorAction SilentlyContinue
              $importCheck = & $python -c "import nunchaku; print('OK')" 2>&1
              if ($importCheck -match "OK") {
                Write-Host "  ✓ nunchaku installed and verified"
              } else {
                Write-Host "  ⚠️ nunchaku install may have failed: $importCheck"
              }
            }
          }

      # ── Insightface pre-built wheel ─────────────────────────────────
      - name: Install insightface (pre-built wheel)
        shell: pwsh
        continue-on-error: true
        run: |
          $python = "$env:PORTABLE\python_embeded\python.exe"
          $pyVer = & $python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')"

          Write-Host "Looking for insightface wheel: $pyVer"

          & $python -c @"
          import urllib.request, json, sys
          url = 'https://huggingface.co/UmeAiRT/ComfyUI-Auto-Installer-Assets/resolve/main/tools_manifest.json'
          try:
              data = json.loads(urllib.request.urlopen(url, timeout=30).read())
              entry = data.get('whl', {}).get('insightface', {}).get('files', {}).get('$pyVer')
              if entry:
                  filename = entry['filename']
                  dl_url = f'https://huggingface.co/UmeAiRT/ComfyUI-Auto-Installer-Assets/resolve/main/{filename}'
                  print(f'WHEEL_URL={dl_url}')
              else:
                  print(f'No insightface wheel for $pyVer', file=sys.stderr)
          except Exception as e:
              print(f'Failed to fetch manifest: {e}', file=sys.stderr)
          "@ | ForEach-Object {
            if ($_ -match "^WHEEL_URL=(.+)$") {
              $wheelUrl = $matches[1]
              $wheelFilename = ($wheelUrl -split '/')[-1]
              $wheelFile = "$env:TEMP\$wheelFilename"
              Write-Host "Downloading insightface from: $wheelUrl"
              Invoke-WebRequest -Uri $wheelUrl -OutFile $wheelFile -UseBasicParsing
              & $python -m pip install $wheelFile --quiet
              Remove-Item $wheelFile -Force -ErrorAction SilentlyContinue
              $importCheck = & $python -c "import insightface; print('OK')" 2>&1
              if ($importCheck -match "OK") {
                Write-Host "  ✓ insightface installed and verified"
              } else {
                Write-Host "  ⚠️ insightface install may have failed: $importCheck"
              }
            }
          }

      # ── Install CLI in embedded Python ──────────────────────────────
      - name: Install UmeAiRT CLI in embedded Python
        shell: pwsh
        continue-on-error: true
        run: |
          $python = "$env:PORTABLE\python_embeded\python.exe"

          # Install the CLI package so download-models command works
          Write-Host "Installing UmeAiRT CLI into embedded Python..."
          & $python -m pip install "${{ github.workspace }}\installer" --quiet 2>&1 | Out-Null
          Write-Host "  ✓ CLI installed"

          # Download model manifest for the downloader
          Write-Host "Downloading model_manifest.json..."
          & $python -c @"
          import urllib.request, os
          url = 'https://huggingface.co/UmeAiRT/ComfyUI-Auto-Installer-Assets/resolve/main/model_manifest.json'
          dest = os.path.join(os.environ['PORTABLE'], 'scripts', 'model_manifest.json')
          urllib.request.urlretrieve(url, dest)
          print(f'  OK: {dest}')
          "@

      # ── UmeAiRT Launchers ─────────────────────────────────────────
      - name: Generate UmeAiRT launchers
        shell: pwsh
        run: |
          # Performance launcher
          $perfContent = @"
          @echo off
          setlocal EnableDelayedExpansion
          chcp 65001 >nul 2>nul
          set "PYTHONPATH="
          set "PYTHONNOUSERSITE=1"
          set "PYTHONUTF8=1"

          :: ============================================================================
          :: UmeAiRT-Start-ComfyUI.bat - Performance Mode
          :: Generated by ComfyUI Auto-Installer (Portable Bundle)
          :: ============================================================================

          set InstallPath=%~dp0
          if "%InstallPath:~-1%"=="\" set "InstallPath=%InstallPath:~0,-1%"

          :: --- Network Mode (saved after first choice) ---
          set "LISTEN_CFG=%InstallPath%\scripts\listen_address"
          set "LISTEN_ADDR=127.0.0.1"

          if exist "%LISTEN_CFG%" set /p LISTEN_ADDR=<"%LISTEN_CFG%"
          if exist "%LISTEN_CFG%" goto :listen_done
          echo.
          echo   === Network Access Mode ===
          echo.
          echo   1. Local  ^(127.0.0.1^)  - PC local only ^(default^)
          echo   2. Open   ^(0.0.0.0^)   - RunPod / cloud / LAN
          echo.
          set /p "NETWORK_CHOICE=  Select [1/2] (default: 1): "
          if "!NETWORK_CHOICE!"=="2" set "LISTEN_ADDR=0.0.0.0"
          echo !LISTEN_ADDR!> "%LISTEN_CFG%"
          echo   [INFO] Saved to %LISTEN_CFG%
          echo   [INFO] To change later, delete this file and relaunch.
          echo.
          :listen_done

          :: --- Launch ComfyUI ---
          echo [INFO] Starting ComfyUI (Performance Mode) on %LISTEN_ADDR%...
          cd /d "%InstallPath%"
          .\python_embeded\python.exe -s ComfyUI\main.py --windows-standalone-build --use-sage-attention --auto-launch --listen %LISTEN_ADDR%

          pause
          "@

          $perfContent | Set-Content -Path "$env:PORTABLE\UmeAiRT-Start-ComfyUI.bat" -Encoding UTF8
          Write-Host "  ✓ UmeAiRT-Start-ComfyUI.bat"

          # LowVRAM launcher
          $lowvramContent = @"
          @echo off
          setlocal EnableDelayedExpansion
          chcp 65001 >nul 2>nul
          set "PYTHONPATH="
          set "PYTHONNOUSERSITE=1"
          set "PYTHONUTF8=1"

          :: ============================================================================
          :: UmeAiRT-Start-ComfyUI_LowVRAM.bat - Low VRAM / Stability Mode
          :: Generated by ComfyUI Auto-Installer (Portable Bundle)
          :: ============================================================================

          set InstallPath=%~dp0
          if "%InstallPath:~-1%"=="\" set "InstallPath=%InstallPath:~0,-1%"

          set "LISTEN_CFG=%InstallPath%\scripts\listen_address"
          set "LISTEN_ADDR=127.0.0.1"
          if exist "%LISTEN_CFG%" set /p LISTEN_ADDR=<"%LISTEN_CFG%"
          if exist "%LISTEN_CFG%" goto :listen_done
          echo.
          echo   === Network Access Mode ===
          echo.
          echo   1. Local  ^(127.0.0.1^)  - PC local only ^(default^)
          echo   2. Open   ^(0.0.0.0^)   - RunPod / cloud / LAN
          echo.
          set /p "NETWORK_CHOICE=  Select [1/2] (default: 1): "
          if "!NETWORK_CHOICE!"=="2" set "LISTEN_ADDR=0.0.0.0"
          echo !LISTEN_ADDR!> "%LISTEN_CFG%"
          :listen_done

          echo [INFO] Starting ComfyUI (Low VRAM Mode) on %LISTEN_ADDR%...
          cd /d "%InstallPath%"
          .\python_embeded\python.exe -s ComfyUI\main.py --windows-standalone-build --use-sage-attention --auto-launch --disable-smart-memory --lowvram --fp8_e4m3fn-text-enc --listen %LISTEN_ADDR%

          pause
          "@

          $lowvramContent | Set-Content -Path "$env:PORTABLE\UmeAiRT-Start-ComfyUI_LowVRAM.bat" -Encoding UTF8
          Write-Host "  ✓ UmeAiRT-Start-ComfyUI_LowVRAM.bat"

          # Manager TUI launcher
          $managerContent = @"
          @echo off
          setlocal EnableDelayedExpansion
          chcp 65001 >nul 2>nul
          set "PYTHONPATH="
          set "PYTHONNOUSERSITE=1"
          set "PYTHONUTF8=1"

          :: ============================================================================
          :: UmeAiRT-Manager.bat - TUI Manager (update, download, reinstall, settings)
          :: Generated by ComfyUI Auto-Installer (Portable Bundle)
          :: ============================================================================

          set InstallPath=%~dp0
          if "%InstallPath:~-1%"=="\" set "InstallPath=%InstallPath:~0,-1%"

          cd /d "%InstallPath%"
          .\python_embeded\python.exe -s -m umeairt_comfyui_installer

          pause
          "@

          $managerContent | Set-Content -Path "$env:PORTABLE\UmeAiRT-Manager.bat" -Encoding UTF8
          Write-Host "  ✓ UmeAiRT-Manager.bat"

      # ── Cleanup ───────────────────────────────────────────────────
      - name: Cleanup before packaging
        shell: pwsh
        run: |
          Write-Host "Cleaning up..."

          # Remove original ComfyUI launchers (replaced by UmeAiRT launchers)
          $origFiles = @(
            "run_nvidia_gpu.bat",
            "run_nvidia_gpu_fast_fp16_accumulation.bat",
            "run_cpu.bat",
            "README_VERY_IMPORTANT.txt"
          )
          foreach ($f in $origFiles) {
            $fPath = "$env:PORTABLE\$f"
            if (Test-Path $fPath) {
              Remove-Item $fPath -Force
              Write-Host "  Removed $f"
            }
          }

          # Remove .git directories from custom nodes (save space)
          Get-ChildItem "$env:PORTABLE\ComfyUI\custom_nodes" -Directory -Recurse -Filter ".git" |
            ForEach-Object {
              Remove-Item $_.FullName -Recurse -Force -ErrorAction SilentlyContinue
              Write-Host "  Removed $($_.FullName)"
            }

          # Remove __pycache__ directories
          Get-ChildItem $env:PORTABLE -Directory -Recurse -Filter "__pycache__" |
            ForEach-Object {
              Remove-Item $_.FullName -Recurse -Force -ErrorAction SilentlyContinue
            }
          Write-Host "  ✓ __pycache__ removed"

          # Remove pip cache
          $pipCache = "$env:PORTABLE\python_embeded\pip"
          if (Test-Path $pipCache) {
            Remove-Item $pipCache -Recurse -Force -ErrorAction SilentlyContinue
          }

          # Show final size
          $size = (Get-ChildItem $env:PORTABLE -Recurse -File | Measure-Object -Property Length -Sum).Sum
          Write-Host "Bundle size before compression: $([math]::Round($size / 1GB, 2)) GB"

      # ── Compress ──────────────────────────────────────────────────
      - name: Compress bundle
        id: compress
        shell: pwsh
        run: |
          $bundleName = "UmeAiRT-ComfyUI-Portable-Win-NVIDIA-$env:COMFYUI_VERSION-$env:NODE_TIER.7z"
          Write-Host "Compressing to $bundleName..."
          7z a -t7z -mx=7 -mmt=on "C:\$bundleName" "$env:PORTABLE\*"

          $file = Get-Item "C:\$bundleName"
          $size = $file.Length
          Write-Host "Compressed size: $([math]::Round($size / 1GB, 2)) GB"

          # Compute SHA-256
          $hash = (Get-FileHash "C:\$bundleName" -Algorithm SHA256).Hash.ToLower()
          Write-Host "SHA-256: $hash"

          echo "bundle_name=$bundleName" >> $env:GITHUB_OUTPUT
          echo "bundle_sha256=$hash" >> $env:GITHUB_OUTPUT
          echo "bundle_size=$size" >> $env:GITHUB_OUTPUT

          echo "BUNDLE_NAME=$bundleName" >> $env:GITHUB_ENV
          echo "BUNDLE_PATH=C:\$bundleName" >> $env:GITHUB_ENV

      # ── Upload as GitHub artifact ─────────────────────────────────
      # Save bundle metadata for manifest job
      - name: Save bundle metadata
        shell: pwsh
        run: |
          $meta = @{
            bundle_name = $env:BUNDLE_NAME
            bundle_sha256 = "${{ steps.compress.outputs.bundle_sha256 }}"
            bundle_size = "${{ steps.compress.outputs.bundle_size }}"
            python_version = "${{ steps.verify.outputs.python_version }}"
            pytorch_version = "${{ steps.verify.outputs.pytorch_version }}"
            cuda_version = "${{ steps.verify.outputs.cuda_version }}"
            node_tier = $env:NODE_TIER
            node_count = "${{ steps.nodes.outputs.node_count }}"
            node_list = '${{ steps.nodes.outputs.node_list }}'
          } | ConvertTo-Json
          $meta | Set-Content -Path "C:\bundle_metadata.json"

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-bundle-${{ matrix.node_tier }}
          path: ${{ env.BUNDLE_PATH }}
          retention-days: 7

      - name: Upload bundle metadata
        uses: actions/upload-artifact@v4
        with:
          name: bundle-metadata-${{ matrix.node_tier }}
          path: C:\bundle_metadata.json
          retention-days: 1

      # ── Upload to HuggingFace ─────────────────────────────────────
      - name: Upload to HuggingFace
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONUTF8: '1'
        run: |
          $python = "$env:PORTABLE\python_embeded\python.exe"
          & $python -c @"
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          bundle = os.environ['BUNDLE_PATH']
          name = os.environ['BUNDLE_NAME']
          repo = os.environ.get('HF_REPO', 'UmeAiRT/ComfyUI-Auto-Installer-Assets')
          dist_dir = os.environ.get('DIST_DIR', 'distributions')
          print(f'Uploading {name} to HuggingFace ({repo})...')
          api.upload_file(
              path_or_fileobj=bundle,
              path_in_repo=f'{dist_dir}/{name}',
              repo_id=repo,
              repo_type='model',
          )
          print('[OK] Uploaded to HuggingFace!')
          "@

      # ── Upload to ModelScope ──────────────────────────────────────
      - name: Upload to ModelScope
        continue-on-error: true
        shell: pwsh
        env:
          MODELSCOPE_API_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
          PYTHONUTF8: '1'
        run: |
          $python = "$env:PORTABLE\python_embeded\python.exe"
          & $python -m pip install modelscope --quiet
          & $python -c @"
          from modelscope.hub.api import HubApi
          import os
          endpoint = os.environ.get('MS_ENDPOINT', 'https://www.modelscope.ai')
          api = HubApi(endpoint=endpoint)
          api.login(os.environ['MODELSCOPE_API_TOKEN'])
          bundle = os.environ['BUNDLE_PATH']
          name = os.environ['BUNDLE_NAME']
          repo = os.environ.get('MS_REPO', 'UmeAiRT/ComfyUI-Auto-Installer-Assets')
          dist_dir = os.environ.get('DIST_DIR', 'distributions')
          print(f'Uploading {name} to ModelScope ({repo} via {endpoint})...')
          api.upload_file(
              path_or_fileobj=bundle,
              path_in_repo=f'{dist_dir}/{name}',
              repo_id=repo,
              repo_type='dataset',
              commit_message=f'CI: Upload portable bundle {name}',
          )
          print('[OK] Uploaded to ModelScope!')
          "@

  # ---------------------------------------------------------------------------
  # Job 3: Update distributions manifest on Assets repos
  # ---------------------------------------------------------------------------
  update-manifest:
    name: "Update distributions manifest"
    needs: [check-release, build-bundle]
    if: always() && needs.build-bundle.result != 'cancelled' && needs.build-bundle.result != 'failure'
    runs-on: ubuntu-latest
    env:
      COMFYUI_VERSION: ${{ needs.check-release.outputs.version }}
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SDK
        run: pip install huggingface_hub modelscope

      - name: Download all bundle metadata
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-metadata-*
          path: metadata

      - name: Update distributions_manifest.json
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODELSCOPE_API_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, datetime, tempfile, sys, glob

          hf_repo    = os.environ["HF_REPO"]
          ms_repo    = os.environ["MS_REPO"]
          ms_endpoint = os.environ["MS_ENDPOINT"]
          dist_dir   = os.environ["DIST_DIR"]
          manifest_name = os.environ["MANIFEST_NAME"]
          version    = os.environ["COMFYUI_VERSION"]
          today      = datetime.date.today().isoformat()

          # ── Fetch existing manifest from HuggingFace ──────────────
          manifest = {
              "_manifest_version": 1,
              "_updated": today,
              "_description": "Portable UmeAiRT-ComfyUI bundle registry. Lists all pre-built distributions with metadata.",
              "_sources": {
                  "huggingface": f"https://huggingface.co/{hf_repo}/resolve/main/{dist_dir}/",
                  "modelscope": f"{ms_endpoint}/datasets/{ms_repo}/resolve/master/{dist_dir}/",
              },
              "distributions": {},
          }

          from huggingface_hub import HfApi, hf_hub_download
          hf_api = HfApi()

          try:
              path = hf_hub_download(
                  repo_id=hf_repo,
                  filename=manifest_name,
                  repo_type="model",
              )
              with open(path) as f:
                  existing = json.load(f)
              manifest["distributions"] = existing.get("distributions", {})
              print(f"Loaded existing manifest with {len(manifest['distributions'])} entries.")
          except Exception as e:
              print(f"No existing manifest found ({e}), creating new one.")

          # ── Process each tier's metadata ────────────────────────────
          metadata_files = glob.glob("metadata/bundle-metadata-*/bundle_metadata.json")
          print(f"Found {len(metadata_files)} bundle metadata file(s).")

          for meta_file in metadata_files:
              with open(meta_file) as f:
                  meta = json.load(f)

              tier = meta["node_tier"]
              bundle_key = f"{version}_nvidia_{tier}"
              node_count = int(meta.get("node_count", "0"))
              node_list_raw = meta.get("node_list", "[]")
              try:
                  nodes = json.loads(node_list_raw)
              except (json.JSONDecodeError, TypeError):
                  nodes = []

              manifest["_updated"] = today
              manifest["distributions"][bundle_key] = {
                  "filename": f"{dist_dir}/{meta['bundle_name']}",
                  "comfyui_version": version,
                  "platform": "windows",
                  "gpu": "nvidia",
                  "cuda_version": meta["cuda_version"],
                  "python_version": meta["python_version"],
                  "pytorch_version": meta["pytorch_version"],
                  "node_tier": tier,
                  "node_count": node_count,
                  "nodes": nodes,
                  "sha256": meta["bundle_sha256"],
                  "size_bytes": int(meta["bundle_size"]),
                  "built_at": datetime.datetime.now(datetime.UTC).isoformat() + "Z",
              }

              print(f"Added/updated: {bundle_key}")
              print(f"  File: {dist_dir}/{meta['bundle_name']}")
              print(f"  {node_count} nodes ({tier} tier)")

          # ── Write to temp file ─────────────────────────────────────
          manifest_path = os.path.join(tempfile.gettempdir(), manifest_name)
          with open(manifest_path, "w") as f:
              json.dump(manifest, f, indent=2)

          # ── Upload to HuggingFace ──────────────────────────────────
          bundle_keys = [k for k in manifest["distributions"] if k.startswith(version)]
          commit_msg = f"CI: Update manifest — {', '.join(bundle_keys)}"
          print(f"\nUploading manifest to HuggingFace ({hf_repo})...")
          hf_api.upload_file(
              path_or_fileobj=manifest_path,
              path_in_repo=manifest_name,
              repo_id=hf_repo,
              repo_type="model",
              commit_message=commit_msg,
          )
          print("[OK] Manifest uploaded to HuggingFace!")

          # ── Upload to ModelScope ───────────────────────────────────
          try:
              from modelscope.hub.api import HubApi
              ms_api = HubApi(endpoint=ms_endpoint)
              ms_api.login(os.environ["MODELSCOPE_API_TOKEN"])
              print(f"Uploading manifest to ModelScope ({ms_repo} via {ms_endpoint})...")
              ms_api.upload_file(
                  path_or_fileobj=manifest_path,
                  path_in_repo=manifest_name,
                  repo_id=ms_repo,
                  repo_type="dataset",
                  commit_message=commit_msg,
              )
              print("[OK] Manifest uploaded to ModelScope!")
          except Exception as e:
              print(f"[WARN] ModelScope upload failed (non-blocking): {e}", file=sys.stderr)

          print(f"\nManifest now contains {len(manifest['distributions'])} distribution(s).")
          PYEOF
