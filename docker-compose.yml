services:
  comfyui:
    build: .
    image: umeairt/comfyui:latest
    container_name: umeairt-comfyui
    restart: unless-stopped
    user: root
    entrypoint: ["bash", "-c", "chown -R umeairt:umeairt /app/custom_nodes /app/models /app/output /app/input /app/user && su umeairt -c /app/entrypoint.sh"]
    ports:
      - "8188:8188"
    volumes:
      # Map the auto-installer's external architecture directly to host directories.
      # This isolates your heavy downloads and generated images outside the container.
      # Upon first boot, the entrypoint will automatically clone missing custom nodes
      # into the empty bindings!
      - E:/AI/dev/docker/models:/app/models
      - E:/AI/dev/docker/custom_nodes:/app/custom_nodes
      - E:/AI/dev/docker/output:/app/output
      - E:/AI/dev/docker/input:/app/input
      - E:/AI/dev/docker/user:/app/user
    deploy:
      resources:
        reservations:
          devices:
            # NVIDIA Container Toolkit passthrough (Requires Windows WSL2 / Linux host with drivers installed)
            # If you are using CPU-only or a non-NVIDIA GPU, comment out these 3 lines.
            - driver: nvidia
              count: all
              capabilities: [gpu]
