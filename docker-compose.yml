services:
  comfyui:
    build:
      context: .
      args:
        # ── Image Variant ───────────────────────────────────────────
        #   standard → ComfyUI only (default)
        #   cloud    → ComfyUI + JupyterLab (for RunPod / cloud)
        VARIANT: standard
    image: ghcr.io/umeairt/comfyui:latest
    container_name: umeairt-comfyui
    restart: unless-stopped
    ports:
      - "8188:8188"
      # Uncomment for JupyterLab (cloud variant only):
      # - "8888:8888"
    environment:
      # ── Custom Nodes Bundle ─────────────────────────────────────
      #   minimal  → ComfyUI-Manager only
      #   umeairt  → + UmeAiRT Sync/Toolkit + essential creative nodes
      #   full     → + all community nodes (~34 nodes, default)
      - NODE_TIER=full
      # ── JupyterLab (cloud variant only) ─────────────────────────
      # Requires: VARIANT: cloud in build args above.
      # - JUPYTER_ENABLE=true
      # - JUPYTER_TOKEN=mysecrettoken
      # - JUPYTER_PORT=8888
    user: "1000:1000"
    volumes:
      # Single volume for ALL persistent data (models, nodes, outputs, etc.)
      # Everything is stored in /data inside the container and symlinked to /app.
      #
      # Option 1 — Docker managed volume (recommended):
      - comfyui-data:/data
      #
      # Option 2 — Local folder (uncomment below, comment above):
      # - ./comfyui_data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# Named volume (Docker manages storage location automatically)
volumes:
  comfyui-data:
